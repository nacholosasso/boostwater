<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Producto - BoostWater</title>
    <link rel="stylesheet" href="./css/style.css">
    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 antialiased font-sans flex flex-col min-h-screen">

    <!-- Contenedor del Navbar Dinámico -->
    <div id="navbar-container"></div>

    <!-- Contenedor Principal del Producto -->
    <main class="flex-grow container mx-auto px-6 py-32" id="detalle-producto">
        <div class="text-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-brand-500 mx-auto mb-4"></div>
            <p class="text-gray-500 font-medium">Cargando detalles del producto...</p>
        </div>
    </main>

    <!-- Contenedor del Carrito Dinámico -->
    <div id="cart-container"></div>

    <!-- Contenedor del Footer Dinámico -->
    <div id="footer-container" class="mt-auto w-full"></div>

    <!-- Contenedor del WhatsApp Dinámico -->
    <div id="whatsapp-container"></div>

    <!-- Scripts de Animación AOS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ once: true, duration: 800, offset: 50 });</script>

    <!-- App Scripts Centralizados -->
    <script type="module" src="./js/app.js"></script>
</body>
</html>
