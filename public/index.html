<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoostWater</title>
    <meta property="og:title" content="BoostWater - Equipamiento Premium">
    <meta property="og:description" content="Equipamiento premium para potenciar tus travesías en el agua. Especialistas en propulsión eléctrica acuática.">
    <meta property="og:image" content="https://boostwater-497012.web.app/logo.webp">
    <meta property="og:url" content="https://boostwater-497012.web.app/">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="./css/style.css">
    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 antialiased font-sans flex flex-col min-h-screen">

    <!-- Contenedor del Navbar Dinámico -->
    <div id="navbar-container"></div>

    <!-- Hero Section (Carrusel de 3 Imágenes) -->
    <header class="relative w-full h-[65vh] flex items-center justify-center overflow-hidden mt-[72px]">
        <!-- Carrusel Mixto (Video + Imágenes) 100% ancho -->
        <div id="hero-carousel" class="absolute inset-0 w-full h-full bg-black z-0">
            <div class="hero-slide absolute inset-0 w-full h-full bg-black opacity-70 transition-opacity duration-1000 ease-in-out active-slide overflow-hidden pointer-events-none">
                <iframe src="https://www.youtube-nocookie.com/embed/UYm0TTdMN0I?autoplay=1&mute=1&loop=1&playlist=UYm0TTdMN0I&controls=0&playsinline=1" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[100vw] h-[56.25vw] min-h-[75vh] min-w-[133.33vh] object-cover" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <img src="./foto_principal.webp" class="hero-slide absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-1000 ease-in-out" alt="Boostwater Hero 1">
            <img src="./foto_principal_2.jpg" class="hero-slide absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-1000 ease-in-out" alt="Boostwater Hero 2">
            <img src="./foto_principal_3.webp" class="hero-slide absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-1000 ease-in-out" alt="Boostwater Hero 3">
        </div>
        
        <div class="relative z-10 text-center px-4 flex flex-col items-center pointer-events-none" data-aos="zoom-in" data-aos-duration="1000">
            <h1 class="text-5xl md:text-7xl font-black text-white mb-6 tracking-tight uppercase drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)]">Equipamiento <br><span class="text-brand-500">Premium</span></h1>
            <a href="#catalogo" class="bg-brand-500 hover:bg-brand-600 text-white font-bold py-4 px-10 rounded-full transition-all transform hover:scale-105 shadow-[0_0_20px_rgba(14,165,233,0.4)] pointer-events-auto" data-aos="fade-up" data-aos-delay="400">Ver Productos</a>
        </div>

        <!-- Controles del carrusel -->
        <div class="absolute bottom-8 left-0 right-0 flex justify-center gap-3 z-20">
            <button class="carousel-dot w-3 h-3 rounded-full bg-white opacity-100 transition-opacity" data-slide="0"></button>
            <button class="carousel-dot w-3 h-3 rounded-full bg-white opacity-50 transition-opacity" data-slide="1"></button>
            <button class="carousel-dot w-3 h-3 rounded-full bg-white opacity-50 transition-opacity" data-slide="2"></button>
            <button class="carousel-dot w-3 h-3 rounded-full bg-white opacity-50 transition-opacity" data-slide="3"></button>
        </div>
    </header>

    <!-- Catálogo de Productos -->
    <main id="catalogo" class="flex-grow container mx-auto px-6 py-20">
        <div class="text-center mb-16" data-aos="fade-up">
            <h2 class="text-4xl font-extrabold text-brand-900 tracking-tight">Productos</h2>
            <div class="w-24 h-1.5 bg-brand-500 mx-auto mt-4 rounded-full"></div>
        </div>
        
        <div id="contenedor-productos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-10">
            <div class="col-span-full text-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-brand-500 mx-auto mb-4"></div>
                <p class="text-gray-500 animate-pulse font-medium">Cargando productos...</p>
            </div>
        </div>
    </main>
    
    <!-- Sección de Innovación K5 EDGE (Debajo del Catálogo) -->
    <section class="w-full h-[50vh] md:h-[70vh] relative overflow-hidden bg-black mt-10 border-t border-gray-800">
        <div class="absolute inset-0 w-full h-full pointer-events-none overflow-hidden opacity-80">
            <iframe src="https://www.youtube-nocookie.com/embed/wfh4hCaUjN0?autoplay=1&mute=1&loop=1&playlist=wfh4hCaUjN0&controls=0&playsinline=1" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[100vw] h-[56.25vw] min-h-[75vh] min-w-[133.33vh] object-cover" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-10">
            <h2 class="text-4xl md:text-6xl font-black text-white uppercase tracking-widest drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] text-center px-4" data-aos="zoom-in">Innovación <br><span class="text-brand-500">K5 EDGE</span></h2>
        </div>
    </section>

    <!-- Contenedor del Carrito Dinámico -->
    <div id="cart-container"></div>

    <!-- Contenedor del Footer Dinámico -->
    <div id="footer-container" class="mt-auto w-full"></div>

    <!-- Contenedor del WhatsApp Dinámico -->
    <div id="whatsapp-container"></div>

    <!-- Scripts de Animación AOS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ once: true, duration: 800, offset: 50 });</script>

    <!-- App Scripts Centralizados -->
    <script type="module" src="./js/app.js"></script>
</body>
</html>
