<!-- Overlay del Carrito -->
<div id="cart-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300"></div>

<!-- Sidecart (Carrito lateral derecho) -->
<aside id="cart-sidebar" class="fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
    <div class="px-6 py-5 border-b flex justify-between items-center bg-gray-50">
        <h2 class="text-xl font-black text-brand-900 uppercase tracking-wide">Tu Carrito</h2>
        <button id="cart-close" class="text-gray-400 hover:text-red-500 transition-colors bg-white rounded-full p-2 shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
    </div>
    
    <div id="contenedor-carrito" class="flex-1 overflow-y-auto p-6 space-y-4 bg-gray-50/50">
    </div>
    
    <!-- Opciones de Entrega (Retiro + Correo Argentino) -->
    <div id="envio-calculator-section" class="p-6 border-t bg-gray-50 hidden">
        <h4 class="text-sm font-bold text-gray-800 mb-4">📦 Opciones de entrega</h4>
        
        <!-- Opción: Retiro en local -->
        <label class="flex items-center justify-between p-3 bg-white border border-gray-200 rounded-xl cursor-pointer hover:border-brand-500 transition-colors shadow-sm mb-3">
            <div class="flex items-center gap-3">
                <input type="radio" name="tipo-entrega" value="retiro" class="w-4 h-4 text-brand-500 focus:ring-brand-500 cursor-pointer" checked>
                <div>
                    <p class="text-sm font-bold text-gray-800">Retiro en local</p>
                    <p class="text-xs text-gray-500">Gratis</p>
                </div>
            </div>
            <span class="font-bold text-green-600">Gratis</span>
        </label>

        <!-- Opción: Envío por correo -->
        <label class="flex items-center justify-between p-3 bg-white border border-gray-200 rounded-xl cursor-pointer hover:border-brand-500 transition-colors shadow-sm mb-2">
            <div class="flex items-center gap-3">
                <input type="radio" name="tipo-entrega" value="envio" class="w-4 h-4 text-brand-500 focus:ring-brand-500 cursor-pointer">
                <div>
                    <p class="text-sm font-bold text-gray-800">Envío por correo</p>
                    <p class="text-xs text-gray-500">Costo a calcular</p>
                </div>
            </div>
        </label>

        <!-- Calculador de Envíos -->
        <div id="calculador-envio-wrapper" class="hidden mt-3 pt-3 border-t border-gray-200">
            <p class="text-xs font-semibold text-gray-600 mb-2">Ingresá tu código postal (CP):</p>
            <div class="flex gap-2">
                <input type="text" id="input-cp" placeholder="Tu CP (ej: 7600)" class="flex-1 px-4 py-2 rounded-xl border border-gray-200 focus:ring-2 focus:ring-brand-500 outline-none text-sm bg-white">
                <button id="btn-calcular-cp" class="bg-brand-900 hover:bg-brand-500 text-white px-4 py-2 rounded-xl text-sm font-bold transition-colors">Calcular</button>
            </div>
            <div id="opciones-envio-container" class="space-y-3 mt-4 empty:hidden"></div>
        </div>
    </div>

    <div class="p-6 border-t bg-white shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
        <div id="resumen-envio-global" class="flex justify-between items-center mb-2 text-sm text-gray-600 hidden">
            <span id="resumen-envio-nombre">Envío</span>
            <span class="font-bold text-gray-800" id="resumen-envio-costo">$0</span>
        </div>
        <div class="flex justify-between items-center mb-6">
            <span class="font-bold text-gray-500 text-lg">Total estimado:</span>
            <span class="text-3xl font-black text-brand-900">$<span id="total-carrito">0</span></span>
        </div>
        <button id="btn-pagar" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-black text-lg py-4 rounded-xl transition-all shadow-lg hover:shadow-brand-500/50 hidden">Finalizar Compra</button>
    </div>
</aside>
